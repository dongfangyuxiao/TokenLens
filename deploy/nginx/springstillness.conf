upstream springstillness_audit {
    server 127.0.0.1:8000;
}

upstream springstillness_license_admin {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name audit.example.com;

    client_max_body_size 200m;

    location / {
        proxy_pass http://springstillness_audit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name license.example.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://springstillness_license_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
